<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <title>Login - Controle de Itens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-80">

        <h1 class="text-2xl font-bold mb-6 text-center">
            Controle de Itens
        </h1>

        <form id="loginForm" class="space-y-4">

            <input type="email" id="email" placeholder="Seu email" class="w-full border p-2 rounded" />

            <input type="password" id="password" placeholder="Senha" class="w-full border p-2 rounded" />

            <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
                Entrar
            </button>

            <button type="button" id="registerBtn" class="w-full bg-gray-500 text-white p-2 rounded hover:bg-gray-600">
                Criar conta
            </button>

        </form>

        <p id="errorMessage" class="text-red-500 text-sm mt-3"></p>

    </div>

    <script type="module" src="./auth.js"></script>

</body>

</html>
