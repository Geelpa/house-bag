<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <title>Controle de Itens</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen">

    <header class="bg-white shadow p-4 flex justify-between">

        <h1 class="text-xl font-bold">
            Controle de Itens
        </h1>

        <button id="logoutBtn" class="text-red-500">
            Sair
        </button>

    </header>


    <div class="max-w-6xl mx-auto p-6">

        <!-- FORM -->

        <div class="bg-white p-4 rounded shadow mb-6">

            <h2 class="text-lg font-semibold mb-3">
                Adicionar Item
            </h2>

            <form id="itemForm" class="grid md:grid-cols-4 gap-3">

                <input type="text" id="name" placeholder="Nome do item" class="border p-2 rounded" />

                <input type="number" id="current" placeholder="Qtd atual" class="border p-2 rounded" />

                <input type="number" id="ideal" placeholder="Qtd ideal" class="border p-2 rounded" />

                <button class="bg-blue-500 text-white rounded px-4">
                    Adicionar
                </button>

            </form>

        </div>

        <div class="md:hidden flex gap-2 mb-4">

            <button id="showItemsBtn" class="flex-1 bg-blue-500 text-white p-2 rounded">
                Itens em casa
            </button>

            <button id="showShoppingBtn" class="flex-1 bg-green-500 text-white p-2 rounded">
                Lista de compras
            </button>

        </div>
        <!-- LISTAS -->

        <div class="grid md:grid-cols-2 gap-6">

            <!-- ITENS EM CASA -->

            <div id="itemsContainer" class="bg-white p-4 rounded shadow">

                <h2 class="text-lg font-bold mb-4">
                    Itens em casa
                </h2>

                <div id="itemsList" class="space-y-2"></div>

            </div>


            <!-- LISTA DE COMPRAS -->

            <div id="shoppingContainer" class="bg-white p-4 rounded shadow hidden md:block">

                <h2 class="text-lg font-bold mb-4">
                    Precisa comprar
                </h2>

                <div id="shoppingList" class="space-y-2"></div>

            </div>

        </div>

    </div>

    <script type="module" src="./ui.js"></script>

</body>

</html>
